name: CD - Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: smm-production
  ECR_REPOSITORY: smm/backend

jobs:
  deploy-backend:
    name: Deploy Backend & Workers
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get image tag from commit
        id: meta
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "image_tag=sha-${SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run database migration
        id: migrate
        run: |
          echo "Running Alembic migration..."
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition smm-production-migration \
            --launch-type FARGATE \
            --network-configuration '{
              "awsvpcConfiguration": {
                "subnets": ${{ secrets.PRIVATE_SUBNET_IDS }},
                "securityGroups": ["${{ secrets.CELERY_SG_ID }}"],
                "assignPublicIp": "DISABLED"
              }
            }' \
            --overrides '{
              "containerOverrides": [{
                "name": "migration",
                "command": ["alembic", "upgrade", "head"]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"

          # Wait for task to complete
          aws ecs wait tasks-stopped \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "$TASK_ARN"

          # Check exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code: $EXIT_CODE"
            exit 1
          fi

          echo "Migration completed successfully"

      - name: Update backend service
        run: |
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}"

          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition smm-production-backend \
            --query 'taskDefinition' \
            --output json)

          # Update image in task definition
          NEW_TASK_DEF=$(echo "$TASK_DEF" | \
            jq --arg IMAGE "$IMAGE" '.containerDefinitions[0].image = $IMAGE' | \
            jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          # Register new task definition
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Update service
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service smm-production-backend \
            --task-definition "$NEW_ARN" \
            --force-new-deployment

          echo "Backend service updated with $IMAGE"

      - name: Update celery-worker service
        run: |
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition smm-production-celery-worker \
            --query 'taskDefinition' --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | \
            jq --arg IMAGE "$IMAGE" '.containerDefinitions[0].image = $IMAGE' | \
            jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service smm-production-celery-worker \
            --task-definition "$NEW_ARN" \
            --force-new-deployment

      - name: Update celery-worker-comments service
        run: |
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition smm-production-celery-worker-comments \
            --query 'taskDefinition' --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | \
            jq --arg IMAGE "$IMAGE" '.containerDefinitions[0].image = $IMAGE' | \
            jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service smm-production-celery-worker-comments \
            --task-definition "$NEW_ARN" \
            --force-new-deployment

      - name: Update celery-beat service
        run: |
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition smm-production-celery-beat \
            --query 'taskDefinition' --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | \
            jq --arg IMAGE "$IMAGE" '.containerDefinitions[0].image = $IMAGE' | \
            jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service smm-production-celery-beat \
            --task-definition "$NEW_ARN" \
            --force-new-deployment

      - name: Wait for backend stability
        run: |
          echo "Waiting for backend service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services smm-production-backend
          echo "Backend service is stable"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.FRONTEND_S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"

          # Upload index.html and JSON with no-cache
          aws s3 cp frontend/dist/index.html s3://${{ secrets.FRONTEND_S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

          # Upload any JSON manifest files with short cache
          aws s3 sync frontend/dist/ s3://${{ secrets.FRONTEND_S3_BUCKET }}/ \
            --exclude "*" --include "*.json" \
            --cache-control "public, max-age=60"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Verify backend health
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf "${{ secrets.BACKEND_URL }}/health" | jq -r '.status' 2>/dev/null)
            if [ "$STATUS" = "healthy" ]; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i: Backend not ready yet..."
            sleep 10
          done
          echo "Backend health check failed"
          exit 1

      - name: Verify frontend
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ secrets.FRONTEND_URL }}")
          if [ "$STATUS" = "200" ]; then
            echo "Frontend is accessible!"
          else
            echo "Frontend returned status $STATUS"
            exit 1
          fi
