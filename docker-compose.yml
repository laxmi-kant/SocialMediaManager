version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: smm_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smmpass}
      POSTGRES_DB: ${POSTGRES_DB:-smm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    container_name: smm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  backend:
    build: ./backend
    container_name: smm_backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  celery-worker:
    build: ./backend
    container_name: smm_celery_worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker -l info -Q research,generation,publishing,analytics,profile

  celery-worker-comments:
    build: ./backend
    container_name: smm_celery_worker_comments
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker -l info -Q comments

  celery-beat:
    build: ./backend
    container_name: smm_celery_beat
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app beat -l info

  frontend:
    build: ./frontend
    container_name: smm_frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: smm_network
